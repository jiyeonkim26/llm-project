name: Python Tests with Groq Key

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
    env: 
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: tests
        on:
          push:
            branches: ['*']
        jobs:
          tests:
            strategy:
              matrix:
                python: [3.11]
            runs-on: ubuntu-latest
            steps:
              - uses: actions/checkout@v2
              - name: Set up Python ${{matrix.python}}
                uses: actions/setup-python@v2
                with:
                  python-version: ${{matrix.python}}
              - name: Run tests
                run: |
                  python -m doctest --verbose chat.python
